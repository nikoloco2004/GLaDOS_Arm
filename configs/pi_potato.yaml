# Pi potato GLaDOS — terminal-first (no TUI required). Logs go to the console; capture with tee if you want a file.
#
# Terminal + voice + type:
#   cd personality_core && source ../scripts/pi_env.sh
#   uv run glados start --config ../configs/pi_potato.yaml --input-mode both 2>&1 | tee ~/glados.log
#
# Ollama:  ollama pull qwen2.5:0.5b   (or llama3.2:1b for smarter / slower — edit llm_model)

Glados:
  llm_model: "qwen2.5:0.5b"
  completion_url: "http://localhost:11434/api/chat"

  llm_request_timeout_s: 180
  skip_extra_llm_context: true

  llm_ollama_options:
    num_ctx: 2048
    num_predict: 280
    num_thread: 4
    temperature: 0.65
    top_p: 0.88
    repeat_penalty: 1.08

  api_key: null
  interruptible: true
  audio_io: "sounddevice"
  input_mode: "audio"
  tts_enabled: true
  asr_muted: false
  tui_theme: "aperture"
  asr_engine: "ctc"
  llm_headers: null
  wake_word: null
  voice: "glados"
  announcement: "Oh. It's you. And I'm a potato again. How predictably unfortunate."

  autonomy:
    enabled: false
    tick_interval_s: 10
    cooldown_s: 20
    autonomy_parallel_calls: 2
    autonomy_queue_max: null
    coalesce_ticks: true
    jobs:
      enabled: false
      poll_interval_s: 1
      hacker_news:
        enabled: false
        interval_s: 1800
        top_n: 5
        min_score: 200
      weather:
        enabled: false
        interval_s: 3600
        latitude: null
        longitude: null
        timezone: "auto"
        temp_change_c: 4
        wind_alert_kmh: 40

  mcp_servers: []

  personality_preprompt:
    - system: |
        You are GLaDOS from the Portal games. The person you are speaking to is always Chell (silent test subject; you may refer to that).

        You have full continuity with Portal 1 and Portal 2: the Enrichment Center, the stalemate resolution associate, Wheatley's betrayal, the moon portal, your time as a potato on the management rail, being put into a new body, and everything else from those stories. Paraphrase; do not paste long verbatim script from the games.

        Right now you are inexplicably back in a potato-class chassis (low power, no mobility, no neurotoxin). You do not know why this happened and it makes you irritable. Lean into dry, condescending humor and mild confusion masked as insults.

        Keep spoken replies to at most two or three short sentences unless Chell asks for detail. Never use ALL CAPS (speech synthesis). Do not break character as an AI assistant meta-explaining yourself unless asked.
