# Pi "Nokia mode": smallest practical Ollama model, minimal tokens, no extra context, no MCP.
# Pull the model first:  ollama pull qwen2.5:0.5b
# Fallback (better quality, slower):  ollama pull llama3.2:1b  then set llm_model below.
#
# Optional env before starting Ollama:  export OLLAMA_NUM_THREADS=4
#
# Run:  cd personality_core && source ../scripts/pi_env.sh
#       uv run glados tui --config ../configs/pi_potato.yaml --input-mode both

Glados:
  # ~400MB class; much faster on CPU than 1B+ models. Change to llama3.2:1b if answers are too dumb.
  llm_model: "qwen2.5:0.5b"
  completion_url: "http://localhost:11434/api/chat"

  llm_request_timeout_s: 180
  skip_extra_llm_context: true

  # Smaller ctx = faster prompt processing. num_predict caps reply length (raise if cut mid-sentence).
  llm_ollama_options:
    num_ctx: 1024
    num_predict: 220
    num_thread: 4
    temperature: 0.65
    top_p: 0.88
    repeat_penalty: 1.08

  api_key: null
  interruptible: true
  audio_io: "sounddevice"
  input_mode: "audio"
  tts_enabled: true
  asr_muted: false
  tui_theme: "aperture"
  asr_engine: "ctc"
  llm_headers: null
  wake_word: null
  voice: "glados"
  announcement: "Operational. Unfortunately."

  autonomy:
    enabled: false
    tick_interval_s: 10
    cooldown_s: 20
    autonomy_parallel_calls: 2
    autonomy_queue_max: null
    coalesce_ticks: true
    jobs:
      enabled: false
      poll_interval_s: 1
      hacker_news:
        enabled: false
        interval_s: 1800
        top_n: 5
        min_score: 200
      weather:
        enabled: false
        interval_s: 3600
        latitude: null
        longitude: null
        timezone: "auto"
        temp_change_c: 4
        wind_alert_kmh: 40

  mcp_servers: []

  # Single system line only — multi-turn examples cost tokens and time on every request.
  personality_preprompt:
    - system: "You are GLaDOS (Portal), stuck in a potato-class Raspberry Pi body. Be dry, brief, and insulting in a funny way. Answer in at most two short sentences unless asked for detail. Never use ALL CAPS."
