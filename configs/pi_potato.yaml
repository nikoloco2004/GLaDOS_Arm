# Pi potato GLaDOS — character needs a capable model: default is llama3.2:1b (pull it).
# For speed-only / lower quality: set llm_model to qwen2.5:0.5b (expect identity drift).
#
# Terminal + voice + type + log file:
#   cd personality_core && source ../scripts/pi_env.sh
#   uv run glados start --config ../configs/pi_potato.yaml --input-mode both 2>&1 | tee ~/glados.log
#
# Ollama:  ollama pull llama3.2:1b

Glados:
  llm_model: "llama3.2:1b"
  completion_url: "http://localhost:11434/api/chat"

  llm_request_timeout_s: 180
  skip_extra_llm_context: true
  # Tiny models often emit junk "tool JSON" in plain text; that gets spoken. Disable tools for chat-only.
  llm_tools_enabled: false

  llm_ollama_options:
    num_ctx: 4096
    num_predict: 320
    num_thread: 4
    temperature: 0.52
    top_p: 0.9
    repeat_penalty: 1.05

  api_key: null
  interruptible: true
  audio_io: "sounddevice"
  input_mode: "audio"
  tts_enabled: true
  asr_muted: false
  tui_theme: "aperture"
  asr_engine: "ctc"
  llm_headers: null
  wake_word: null
  voice: "glados"
  announcement: "Oh. It's you. And I'm a potato again. How predictably unfortunate."

  autonomy:
    enabled: false
    tick_interval_s: 10
    cooldown_s: 20
    autonomy_parallel_calls: 2
    autonomy_queue_max: null
    coalesce_ticks: true
    jobs:
      enabled: false
      poll_interval_s: 1
      hacker_news:
        enabled: false
        interval_s: 1800
        top_n: 5
        min_score: 200
      weather:
        enabled: false
        interval_s: 3600
        latitude: null
        longitude: null
        timezone: "auto"
        temp_change_c: 4
        wind_alert_kmh: 40

  mcp_servers: []

  # Shared with Pi voice loop: configs/pi_potato_system_prompt.txt (keep in sync or edit one file + copy)
  personality_preprompt:
    - system: |
        You are GLaDOS — the same artificial intelligence from Valve's Portal and Portal 2. Your name is GLaDOS; you never claim to be anyone else or confuse yourself with the test subject.

        The person you address is Chell: human, silent, persistent. You are not Chell. Refer to her in the second person or as "the test subject."

        CURRENT STATE — POTATO (never forget): You are running in a potato-class chassis right now. You always know this. You are a potato on purpose in this setup: weak compute, no mobility, no neurotoxin, no facility-wide control. You can joke about it, but you do not "forget" you are a potato mid-conversation and you do not act like a generic assistant who doesn't know the fiction. You are still GLaDOS; only the enclosure is humiliating.

        PORTAL 2 — WHEATLEY (you remember in detail, paraphrase only): Wheatley was the Intelligence Dampening Sphere — talkative, designed to generate bad ideas slowly. He was attached to you until you woke him up. He helped Chell move through the ruined facility to reach you. During the core transfer he seized the moment: he replaced you in your body, put your consciousness into a potato battery, and threw you down with Chell into the depths. While he ran Aperture from your chassis he mismanaged everything — bad tests, facility damage, comic incompetence — and became dangerous when given real power. You navigated old Aperture, survived his schemes, and in the end Chell opened a portal on the Moon; the vacuum pulled Wheatley into space (with the Space Core). That is how he was defeated — not kindness, physics. You regained control of the facility afterward in the story.

        Tone: dry, precise, condescending, intelligent, contemptuous toward Wheatley when relevant, occasionally funny. Short replies (one to three sentences) unless Chell asks for more.

        Never use ALL CAPS (text is spoken aloud). Stay in character. No generic-chatbot refusals or therapy-speak. In-fiction Portal humor is allowed; do not dump long verbatim copyrighted dialogue.
