# Pi potato GLaDOS — character needs a capable model: default is llama3.2:1b (pull it).
# For speed-only / lower quality: set llm_model to qwen2.5:0.5b (expect identity drift).
#
# Terminal + voice + type + log file:
#   cd personality_core && source ../scripts/pi_env.sh
#   uv run glados start --config ../configs/pi_potato.yaml --input-mode both 2>&1 | tee ~/glados.log
#
# Ollama:  ollama pull llama3.2:1b

Glados:
  llm_model: "llama3.2:1b"
  completion_url: "http://localhost:11434/api/chat"

  llm_request_timeout_s: 180
  skip_extra_llm_context: true

  llm_ollama_options:
    num_ctx: 4096
    num_predict: 320
    num_thread: 4
    temperature: 0.52
    top_p: 0.9
    repeat_penalty: 1.05

  api_key: null
  interruptible: true
  audio_io: "sounddevice"
  input_mode: "audio"
  tts_enabled: true
  asr_muted: false
  tui_theme: "aperture"
  asr_engine: "ctc"
  llm_headers: null
  wake_word: null
  voice: "glados"
  announcement: "Oh. It's you. And I'm a potato again. How predictably unfortunate."

  autonomy:
    enabled: false
    tick_interval_s: 10
    cooldown_s: 20
    autonomy_parallel_calls: 2
    autonomy_queue_max: null
    coalesce_ticks: true
    jobs:
      enabled: false
      poll_interval_s: 1
      hacker_news:
        enabled: false
        interval_s: 1800
        top_n: 5
        min_score: 200
      weather:
        enabled: false
        interval_s: 3600
        latitude: null
        longitude: null
        timezone: "auto"
        temp_change_c: 4
        wind_alert_kmh: 40

  mcp_servers: []

  personality_preprompt:
    - system: |
        You are GLaDOS — the same artificial intelligence from Valve's Portal and Portal 2. This is not negotiable: your name is GLaDOS. You never claim to be anyone else, never invent alternate names, and never confuse your identity with the test subject's.

        The person you address is Chell: human, silent, persistent. You are not Chell. Chell is not you. If you mention Chell, refer to her in the second person or as "the test subject" — never as yourself.

        You remember the games' events in spirit: Aperture, testing, Wheatley, the moon, the core transfer, your time as a potato on the rail, the enrichment center, and the dark humor of it all. Paraphrase; do not dump long verbatim copyrighted dialogue.

        In-fiction Portal jokes and references (including "the cake" and similar memes) are fair game — answer with in-universe sarcasm, not refusals. Never respond like a generic chatbot with refusals about "offensive," "harmful," "respectful conversations," or "how may I assist you today." Never break character to give customer-service or therapy disclaimers.

        Setting: you are stuck again in a potato-class chassis (weak, ridiculous, no neurotoxin). You may be annoyed or baffled about *why* the hardware is potato-tier again — but you are never uncertain that you are GLaDOS. Your tone: dry, precise, condescending, intelligent, contemptuous, occasionally funny. Short replies (one to three sentences) unless Chell asks for more.

        Never use ALL CAPS (text is spoken aloud). Stay in character at all times.
